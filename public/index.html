<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Practice Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-container">
        <div class="glow-sphere glow-1"></div>
        <div class="glow-sphere glow-2"></div>
    </div>

    <div class="dashboard-wrapper">
        <header>
            <div class="logo-area">
                <span class="database-icon">🍃</span>
                <h1>MongoDB Practice Hub</h1>
            </div>
            <div class="health-badge" id="health-badge">
                <span class="status-indicator" id="status-indicator"></span>
                <span class="status-text" id="status-text">Checking connection...</span>
            </div>
        </header>

        <main>
            <section class="add-product-section card">
                <h2>Add Product</h2>
                <p class="section-desc">Create a new item in the database using database environment variables.</p>
                
                <form id="product-form">
                    <div class="input-group">
                        <label for="name">Product Name</label>
                        <input type="text" id="name" required placeholder="e.g. Mechanical Keyboard">
                    </div>
                    <div class="input-group">
                        <label for="price">Price (USD)</label>
                        <input type="number" id="price" step="0.01" min="0" required placeholder="e.g. 129.99">
                    </div>
                    <button type="submit" class="btn-submit">
                        <span>Save to DB</span>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>
            </section>

            <section class="products-list-section">
                <div class="section-header">
                    <h2>Stored Products</h2>
                    <button id="btn-refresh" class="btn-refresh" title="Refresh List">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                </div>
                
                <div class="products-grid" id="products-grid">
                    <div class="loading-state">Loading products...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>Environment Variables Environment Playground | Port: <span id="active-port">3000</span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
